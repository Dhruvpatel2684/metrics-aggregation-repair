[task]
name = "ast-rewrite-repair"
description = "An AST-based source code transformation engine that parses custom source files, applies configurable rewrite rules through scoped visitors, and produces deterministic transformation reports and rewrite manifests."

[task.difficulty]
level = "hard"
reasoning = "Five interacting defects form a dependency chain where one only manifests after another is fixed, custom source format requires understanding the parser, and hash verification demands all issues fixed simultaneously."

