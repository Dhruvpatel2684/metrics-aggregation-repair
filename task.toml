category = "Package Management"
difficulty = "hard"
tags = ["dependency-resolution", "graph-algorithms", "topological-sort", "version-constraints", "package-management"]

difficulty_explanation = "Five interacting defects across cycle detection boundary logic, two-part registry source filtering, scorer state accumulation, installation ordering, and score field selection form a dependency chain requiring deep understanding of graph traversal semantics."
solution_explanation = "Fix off-by-one comparison in cycle detection, strip whitespace and remove fallback matching in source filter, reset freshness cache between scoring passes, correct sort key for deterministic install order, and use composite score field instead of freshness."
verification_explanation = "Tests validate source registry count, package resolution completeness, scoring pass independence, installation ordering determinism, cycle detection accuracy, integrity hash consistency, and cross-concern coherence."
expert_time_estimate_hours = 3.5

[task]
name = "dep-graph-repair"
description = "A package dependency resolution engine that performs topological graph traversal with version constraint satisfaction, cycle detection, and multi-registry source filtering to compute deterministic installation plans."

[task.difficulty]
level = "hard"
reasoning = "Five interacting defects form a dependency chain where the cycle detection off-by-one removes a graph edge affecting downstream resolution, the source filter has a two-part fix requiring both whitespace stripping and fallback removal, and score field selection creates invisible data corruption."

[task.runtime]
entrypoint = "python3 -m runtime.run_resolver"
language = "python"
dependencies = "stdlib-only"

[task.validator]
command = "bash tests/test.sh"
description = "Runs the resolver and validates output correctness"

[task.repair]
command = "bash solution/solve.sh"
description = "Patches the five interacting defects and re-runs the system"

[task.resources]
timeout = 300
cpu = 2
memory = "2GB"
disk = "1GB"
