difficulty_explanation = "Five interacting logic defects across level boundary detection, two-part source registry filtering, phase-based visit counter accumulation, sort key ordering, and cached boundary invalidation create a dependency chain requiring deep understanding of topological graph traversal semantics."
solution_explanation = "Fix off-by-one comparison in level boundary assignment, strip whitespace and remove prefix fallback in source registry, reset visit counters between resolution phases, add package name to sort key for deterministic ordering, and correct config section with cache bypass for level boundary."
verification_explanation = "Tests validate level distribution counts, source participation presence, phase visit count consistency, topological ordering determinism, integrity hash consistency, and cross-concern coherence requiring all defects fixed simultaneously."
expert_time_estimate_hours = 3.5

[task]
name = "depgraph-topo-repair"
description = "A dependency graph topological resolution engine that assigns packages to levels via chain-length boundary detection, resolves constraints through two-phase traversal, and produces deterministic installation manifests with quality scoring."

[task.difficulty]
level = "hard"
reasoning = "Five interacting logic defects form a dependency chain where the level boundary off-by-one shifts packages between levels affecting downstream computations, the source filter requires a two-part fix, and cached values create invisible dependencies between modules."

