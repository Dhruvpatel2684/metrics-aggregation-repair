[cluster]
cluster_id = raft-cluster-9
total_nodes = 5
leader_node = node_alpha

[nodes]
voter_aliases = alpha:node1,beta:node2,gamma:node3, delta:node4

[epochs]
boundary_threshold = 5
max_epoch = 8

[reconciliation]
window_size = 4
phases = propose,commit

[timing]
election_timeout_ms = 300
heartbeat_interval_ms = 50

[timing.strict]
election_timeout_ms = 150
heartbeat_interval_ms = 50

[quorum]
strategy = majority
cache_ttl = 0
