[engine]
engine_id = tsdb-compact-v3
version = 1.2.0

[collectors]
# Registry of known metric collectors
registered = cpu_host,mem_host,disk_host,net_host
active_collectors = cpu_host,mem_host,disk_host, net_host

[windowing]
# Global windowing parameters for loose alignment
alignment_offset_ms = 5000
window_strategy = fixed

[windowing.precise]
# Precise windowing for bucket-aligned compaction
alignment_offset_ms = 0
boundary_mode = strict

[retention]
tiers = raw,medium,coarse
raw_window_ms = 1000
medium_window_ms = 60000
coarse_window_ms = 300000

[retention.ttl]
raw_hours = 24
medium_hours = 168
coarse_hours = 720

[output]
format = json
precision = 2
base_path = runtime/output
