[project]
project_id = ast-rewrite-7
source_dir = data
output_dir = output

[rules]
active_rules = rename,inline,extract, dead_code
rename_priority = 2
inline_priority = 1
extract_priority = 3
dead_code_priority = 4

[scoping]
max_depth = 10
resolution_strategy = breadth_first

[scoping.strict]
max_depth = 3
resolution_strategy = depth_bounded

[output]
format = json
include_manifest = true
