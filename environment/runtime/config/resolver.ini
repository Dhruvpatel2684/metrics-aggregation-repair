[engine]
engine_id = depgraph-v4
strategy = topological

[sources]
source_aliases = core:c,community:com, internal:int

[traversal]
max_ancestors = 8
cycle_strategy = dfs_backtrack

[traversal.bounded]
max_ancestors = 3
cycle_strategy = strict_dfs

[scoring]
freshness_weight = 0.6
depth_weight = 0.4
normalize = true

[output]
format = json
include_metadata = true
