[registry]
data_directory = /app/runtime/data
output_directory = /app/runtime/output
file_pattern = registry_{name}.dep

[sources]
source_aliases = core:cr,community:cm, internal:in
active_filter = alias_verified

[resolution]
max_depth = 12
allow_prerelease = false
strategy = breadth_first

[scoring]
freshness_weight = 0.4
popularity_weight = 0.3
stability_weight = 0.3
passes = per_registry

[output]
report_file = resolution_report.json
manifest_file = install_manifest.json
include_hash = true
