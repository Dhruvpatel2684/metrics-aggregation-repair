[scheduling]
round_size = 5
priority_threshold = 5
max_concurrent = 8

[scheduling.realtime]
priority_threshold = 8
description = real-time scheduling threshold for latency-sensitive job preemption

[resources]
resource_classes = cpu_bound,memory_bound,io_bound, gpu_bound
allocation_strategy = best_fit
overcommit_ratio = 1.2

[execution]
timeout_seconds = 300
retry_count = 3

[output]
plan_file = execution_plan.json
report_file = schedule_report.json
