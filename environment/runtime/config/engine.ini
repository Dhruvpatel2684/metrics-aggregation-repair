[engine]
data_directory = /app/runtime/data
output_directory = /app/runtime/output
log_level = info
partition_size = 10

[optimizer]
preferred_join_method = sort_merge
allowed_join_methods = hash_join,nested_loop, sort_merge
cost_threshold = 1000
enable_predicate_pushdown = true

[executor]
max_memory_mb = 512
timeout_seconds = 30
null_handling = skip
parallel_partitions = false

[executor.strict]
# Strict mode settings for accurate aggregate computations.
# Ensures NULL values are treated as distinct group members
# rather than being silently discarded during processing.
null_handling = include
coerce_types = false
overflow_check = true

[output]
format = json
include_statistics = true
include_plan = true
integrity_check = true
