[sources]
data_directory = /app/runtime/data
file_pattern = source_*.json

[indexing]
node_capacity = 8
split_min_entries = 3
dimension = 2

[query]
center_lon = 10.5
center_lat = 45.5
search_radius_degrees = 0.5
results_per_page = 50

[output]
report_path = /app/runtime/output/coverage_report.json
features_path = /app/runtime/output/indexed_features.json

[dedup]
enabled = true
strategy = numeric_id
