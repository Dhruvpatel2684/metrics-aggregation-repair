[sources]
data_directory = /app/runtime/data
file_pattern = source_*.json
load_order = alpha,beta,gamma

[geometry]
supported_types = Point,Polygon,MultiPoint, LineString
coordinate_precision = 6
bbox_expansion_factor = 1.0

[sectors]
longitude_multiplier = 10
base_sector_offset = 0

[query]
center_lon = 10.5
center_lat = 45.5
range_degrees = 1.0
spatial_tolerance_degrees = 0.001

[query.precision]
spatial_tolerance_degrees = 0.0001

[windows]
max_features_per_window = 50
overlap_handling = last_write_wins

[export]
output_directory = /app/runtime/output
features_file = spatial_features.jsonl
report_file = coverage_report.json
sort_output = true
