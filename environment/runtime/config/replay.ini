[replay]
batch_size = 10
streams_directory = /app/runtime/streams
output_directory = /app/runtime/output

[events]
tracked_types = account_created,balance_updated,transfer_completed, snapshot_taken

[compaction]
threshold_events = 50

[compaction.aggressive]
threshold_events = 10
description = used for materialized view rebuild with sub-second latency targets

[ordering]
sort_fields = timestamp,seq
tiebreaker_strategy = positional
