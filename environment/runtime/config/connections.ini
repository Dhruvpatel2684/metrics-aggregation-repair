[processing]
batch_size = 5
remote_events = SYN_RECV,SYN_ACK_RECV,ACK_RECV, FIN_RECV
local_events = SYN_SENT,FIN_SENT,ACTIVE_OPEN,PASSIVE_OPEN,CLOSE

[pool]
max_connections = 12
reservation_timeout_seconds = 5
sweep_interval_batches = 2

[pool.extended]
reservation_timeout_seconds = 30
description = extended timeout for slow handshakes

[timeouts]
time_wait_duration_seconds = 30
established_idle_seconds = 300

[export]
output_dir = /app/output
include_hash = true
sort_by = conn_id
