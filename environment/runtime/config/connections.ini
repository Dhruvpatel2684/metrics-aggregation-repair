[pool]
max_connections = 12
connection_timeout_seconds = 120
time_wait_duration_seconds = 30
max_transitions_per_connection = 10
reservation_timeout_seconds = 5

[processing]
event_sources = gateway_alpha,gateway_beta,gateway_gamma,gateway_delta
batch_size = 25

[sequencer]
epoch_offset_gateway_alpha = 0
epoch_offset_gateway_beta = 0
epoch_offset_gateway_gamma = 0
epoch_offset_gateway_delta = 1500

[reconciler]
reconciliation_window_ms = 50
merge_strategy = timestamp_priority
checkpoint_interval = 25
